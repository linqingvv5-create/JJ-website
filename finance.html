<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="资金与投资">
  <meta name="theme-color" content="#e53935">
  <link rel="manifest" href="finance-manifest.webmanifest?v=20260717-28">
  <link rel="icon" href="app-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="app-icon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>林青资金与投资管理系统</title>
  <link rel="stylesheet" href="style.css?v=20260717-28">
  <link rel="stylesheet" href="finance-system.css?v=20260722-13">
  <link rel="stylesheet" href="supabase-auth.css?v=20260722-1">
</head>
<body class="auth-pending">
  <section id="auth-gate" class="auth-gate" aria-live="polite">
    <div id="auth-card" class="auth-card"><p>正在打开密码入口…</p></div>
  </section>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-main">
        <button id="back-button" class="back-button hidden" type="button" aria-label="返回">‹</button>

        <div class="brand-block">
          <h1 id="page-title">林青投资系统</h1>
          <p class="subtitle" id="page-subtitle">打开网页就能查看持仓、现金、计划和下一步动作。</p>
        </div>
        <p class="sync-status sync-status-checking" id="sync-status">检查同步...</p>
      </div>

      <div class="finance-topbar-actions">
        <button id="reset-data-btn" class="topbar-reset" type="button">重置</button>
      </div>
    </header>

    <nav id="finance-module-tabs" class="finance-module-tabs" aria-label="模块页签" hidden></nav>

    <main class="page-content">
      <section id="home-view" class="view is-active">
        <div id="account-list" class="account-stack"></div>
      </section>

      <section id="detail-view" class="view">
        <div id="detail-content"></div>
      </section>

      <section id="funds-view" class="view">
        <div id="funds-content"></div>
      </section>

      <section id="finance-system-view" class="view finance-system-view" aria-live="polite">
        <div id="finance-system-content"></div>
      </section>
    </main>

    <button id="finance-quick-add" class="finance-floating-add" type="button" hidden>＋ 快速记账</button>

    <div class="finance-legacy-nav-bridge" aria-hidden="true">
      <button type="button" data-quick-target="holdings" tabindex="-1"></button>
      <button type="button" data-quick-target="plans" tabindex="-1"></button>
    </div>

    <nav class="quick-actions finance-main-nav" aria-label="资金与投资管理导航">
      <button type="button" data-primary-section="overview"><span>◫</span>总览</button>
      <button type="button" data-primary-section="dreams"><span>♧</span>花园</button>
      <button type="button" data-primary-section="investment"><span>▤</span>股票交易</button>
      <button type="button" data-primary-section="settings"><span>⚙</span>设置</button>
    </nav>
  </div>

  <script src="supabase-auth.js?v=20260722-5"></script>
  <script src="data.js?v=20260722-29"></script>
  <script src="trade-board.js?v=20260722-3"></script>
  <script src="finance-system.js?v=20260722-21"></script>
</body>
</html>
