<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="资金与投资">
  <meta name="theme-color" content="#e53935">
  <link rel="manifest" href="finance-manifest.webmanifest?v=20260717-28">
  <link rel="icon" href="app-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="app-icon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>林青资金与投资管理系统</title>
  <link rel="stylesheet" href="style.css?v=20260717-28">
  <link rel="stylesheet" href="finance-system.css?v=20260721-1">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-main">
        <button id="back-button" class="back-button hidden" type="button" aria-label="返回">‹</button>

        <div class="brand-block">
          <h1 id="page-title">林青投资系统</h1>
          <p class="subtitle" id="page-subtitle">打开网页就能查看持仓、现金、计划和下一步动作。</p>
        </div>
        <p class="sync-status sync-status-checking" id="sync-status">检查同步...</p>
      </div>

      <button id="reset-data-btn" class="topbar-reset" type="button">重置</button>
    </header>

    <main class="page-content">
      <section id="home-view" class="view is-active">
        <div id="account-list" class="account-stack"></div>
      </section>

      <section id="detail-view" class="view">
        <div id="detail-content"></div>
      </section>

      <section id="funds-view" class="view">
        <div id="funds-content"></div>
      </section>

      <section id="finance-system-view" class="view finance-system-view" aria-live="polite">
        <div id="finance-system-content"></div>
      </section>
    </main>

    <nav class="quick-actions finance-main-nav" aria-label="资金与投资管理导航">
      <button type="button" data-finance-view="overview"><span>⌂</span>资金总览</button>
      <button type="button" data-finance-view="ledger"><span>▦</span>家庭账本</button>
      <button type="button" data-finance-view="accounts"><span>▣</span>账户</button>
      <button type="button" data-finance-view="dreams"><span>♧</span>鹅鸭鸡</button>
      <button type="button" data-finance-view="investments"><span>¥</span>投资账户</button>
      <button type="button" data-quick-target="holdings"><span>▤</span>持仓管理</button>
      <button type="button" data-quick-target="plans"><span>◎</span>交易计划</button>
      <button type="button" data-finance-view="reports"><span>▥</span>报表</button>
    </nav>
  </div>

  <script src="data.js?v=20260717-28"></script>
  <script src="sync-auth.js"></script>
  <script src="trade-board.js?v=20260717-28"></script>
  <script src="finance-system.js?v=20260721-1"></script>
</body>
</html>
