<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="JJ 看板">
  <meta name="theme-color" content="#f3f4f6">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="app-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="app-icon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JJ 赚钱项目</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-main">
        <button id="back-button" class="back-button hidden" type="button">返回模块首页</button>

        <div class="brand-block">
          <h1 id="page-title">林青交易看板</h1>
          <p class="subtitle" id="page-subtitle">打开网页就能查看持仓、现金、计划和下一步动作。</p>
          <p class="sync-status sync-status-checking" id="sync-status">正在检查云端同步状态...</p>
        </div>
      </div>

      <div class="header-actions">
        <button id="view-toggle-btn" class="secondary-button" type="button">手机版</button>
        <a class="secondary-button" href="./">返回总首页</a>
        <button id="reset-data-btn" class="secondary-button" type="button">重置为初始数据</button>
        <button id="export-data-btn" class="secondary-button" type="button">导出 JSON</button>
        <button id="import-data-btn" class="primary-button" type="button">导入 JSON</button>
        <input id="import-file" type="file" accept="application/json" hidden>
      </div>
    </header>

    <main class="page-content">
      <section id="home-view" class="view is-active">
        <div id="account-list" class="account-stack"></div>
      </section>

      <section id="detail-view" class="view">
        <div id="detail-content"></div>
      </section>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="sync-auth.js"></script>
  <script src="script.js"></script>
</body>
</html>
