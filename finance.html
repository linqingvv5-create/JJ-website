<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="交易驾驶舱">
  <meta name="theme-color" content="#e53935">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="app-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="app-icon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>林青交易驾驶舱</title>
  <link rel="stylesheet" href="style.css?v=20260717-26">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-main">
        <button id="back-button" class="back-button hidden" type="button" aria-label="返回">‹</button>

        <div class="brand-block">
          <h1 id="page-title">林青投资系统</h1>
          <p class="subtitle" id="page-subtitle">打开网页就能查看持仓、现金、计划和下一步动作。</p>
        </div>
        <p class="sync-status sync-status-checking" id="sync-status">检查同步...</p>
      </div>

      <button id="reset-data-btn" class="topbar-reset" type="button">重置</button>
    </header>

    <main class="page-content">
      <section id="home-view" class="view is-active">
        <div id="account-list" class="account-stack"></div>
      </section>

      <section id="detail-view" class="view">
        <div id="detail-content"></div>
      </section>
    </main>

    <nav class="quick-actions" aria-label="快捷功能">
      <button type="button" data-quick-target="holdings"><span>▤</span>持仓管理</button>
      <button type="button" data-quick-target="plans"><span>◎</span>交易计划</button>
      <button type="button" data-quick-target="funds"><span>¥</span>资金管理</button>
      <button id="export-data-btn" type="button"><span>⇩</span>导出 JSON</button>
      <button id="import-data-btn" type="button"><span>⇧</span>导入 JSON</button>
      <input id="import-file" type="file" accept="application/json" hidden>
    </nav>
  </div>

  <script src="data.js?v=20260717-26"></script>
  <script src="sync-auth.js"></script>
  <script src="trade-board.js?v=20260717-26"></script>
</body>
</html>
